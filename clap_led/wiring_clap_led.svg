<svg width="680" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:Arial,sans-serif">
  <!-- Arduino Uno -->
  <rect x="240" y="140" width="200" height="170" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="340" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#0C447C">Arduino Uno</text>
  <text x="254" y="203" font-size="12" fill="#185FA5">5V</text>
  <text x="254" y="227" font-size="12" fill="#185FA5">GND</text>
  <text x="254" y="251" font-size="12" fill="#185FA5">Pin 2</text>
  <text x="254" y="275" font-size="12" fill="#185FA5">Pin 13</text>
  <circle cx="240" cy="200" r="5" fill="#378ADD"/>
  <circle cx="240" cy="224" r="5" fill="#5F5E5A"/>
  <circle cx="240" cy="248" r="5" fill="#639922"/>
  <circle cx="240" cy="272" r="5" fill="#D4537E"/>

  <!-- HL-009 Sound Sensor -->
  <rect x="35" y="150" width="155" height="135" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="112" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">HL-009</text>
  <text x="112" y="192" text-anchor="middle" font-size="12" fill="#0F6E56">Sound sensor</text>
  <text x="118" y="222" text-anchor="middle" font-size="12" fill="#0F6E56">VCC</text>
  <text x="118" y="246" text-anchor="middle" font-size="12" fill="#0F6E56">GND</text>
  <text x="118" y="270" text-anchor="middle" font-size="12" fill="#0F6E56">DO</text>
  <circle cx="190" cy="219" r="5" fill="#378ADD"/>
  <circle cx="190" cy="243" r="5" fill="#5F5E5A"/>
  <circle cx="190" cy="267" r="5" fill="#639922"/>

  <!-- LED + Resistor -->
  <rect x="490" y="150" width="155" height="135" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="567" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#633806">LED</text>
  <text x="567" y="192" text-anchor="middle" font-size="12" fill="#854F0B">+ 220Ω resistor</text>
  <text x="558" y="246" text-anchor="middle" font-size="12" fill="#854F0B">Anode +</text>
  <text x="558" y="270" text-anchor="middle" font-size="12" fill="#854F0B">Cathode −</text>
  <circle cx="490" cy="243" r="5" fill="#D4537E"/>
  <circle cx="490" cy="267" r="5" fill="#5F5E5A"/>

  <!-- Sensor VCC → Arduino 5V (blue) -->
  <polyline points="190,219 212,219 212,200 240,200" fill="none" stroke="#378ADD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sensor GND → Arduino GND (gray) -->
  <polyline points="190,243 214,243 214,224 240,224" fill="none" stroke="#888780" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sensor DO → Arduino Pin 2 (green) -->
  <polyline points="190,267 216,267 216,248 240,248" fill="none" stroke="#639922" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- LED anode → Arduino Pin 13 (pink) -->
  <polyline points="490,243 465,243 465,272 440,272" fill="none" stroke="#D4537E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- LED cathode → GND (gray dashed) -->
  <polyline points="490,267 468,267 468,300 215,300 215,224 240,224" fill="none" stroke="#888780" stroke-width="2" stroke-dasharray="5,3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Legend -->
  <rect x="35" y="330" width="610" height="70" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="340" y="350" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">Wire legend</text>
  <line x1="55" y1="372" x2="100" y2="372" stroke="#378ADD" stroke-width="2"/>
  <text x="108" y="376" font-size="11" fill="#2C2C2A">VCC → 5V</text>
  <line x1="200" y1="372" x2="245" y2="372" stroke="#888780" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="253" y="376" font-size="11" fill="#2C2C2A">GND shared</text>
  <line x1="370" y1="372" x2="415" y2="372" stroke="#639922" stroke-width="2"/>
  <text x="423" y="376" font-size="11" fill="#2C2C2A">DO → Pin 2</text>
  <line x1="510" y1="372" x2="555" y2="372" stroke="#D4537E" stroke-width="2"/>
  <text x="563" y="376" font-size="11" fill="#2C2C2A">LED → Pin 13</text>

  <!-- Note -->
  <text x="340" y="18" text-anchor="middle" font-size="11" fill="#5F5E5A">HL-009 via 3.3V · use INPUT_PULLUP in code · adjust onboard pot for finger snap sensitivity</text>
</svg>
