<svg width="680" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:Arial,sans-serif">
  <!-- Arduino Uno -->
  <rect x="240" y="140" width="200" height="170" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="340" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#0C447C">Arduino Uno</text>
  <text x="254" y="200" font-size="12" fill="#185FA5">5V</text>
  <text x="254" y="224" font-size="12" fill="#185FA5">GND</text>
  <text x="254" y="248" font-size="12" fill="#185FA5">Pin 2</text>
  <text x="254" y="272" font-size="12" fill="#185FA5">Pin 9 ~</text>
  <circle cx="240" cy="197" r="5" fill="#378ADD"/>
  <circle cx="240" cy="221" r="5" fill="#5F5E5A"/>
  <circle cx="240" cy="245" r="5" fill="#639922"/>
  <circle cx="240" cy="269" r="5" fill="#D85A30"/>

  <!-- HL-009 Sound Sensor -->
  <rect x="35" y="150" width="155" height="135" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="112" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">HL-009</text>
  <text x="112" y="192" text-anchor="middle" font-size="12" fill="#0F6E56">Sound sensor</text>
  <text x="118" y="222" text-anchor="middle" font-size="12" fill="#0F6E56">VCC</text>
  <text x="118" y="246" text-anchor="middle" font-size="12" fill="#0F6E56">GND</text>
  <text x="118" y="270" text-anchor="middle" font-size="12" fill="#0F6E56">DO</text>
  <circle cx="190" cy="219" r="5" fill="#378ADD"/>
  <circle cx="190" cy="243" r="5" fill="#5F5E5A"/>
  <circle cx="190" cy="267" r="5" fill="#639922"/>

  <!-- SG90 Servo (top center) -->
  <rect x="255" y="30" width="200" height="90" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="355" y="56" text-anchor="middle" font-size="14" font-weight="bold" fill="#712B13">SG90 Servo</text>
  <text x="355" y="73" text-anchor="middle" font-size="12" fill="#993C1D">3-wire connector</text>
  <circle cx="315" cy="120" r="5" fill="#5F5E5A"/>
  <circle cx="355" cy="120" r="5" fill="#378ADD"/>
  <circle cx="395" cy="120" r="5" fill="#D85A30"/>
  <text x="315" y="137" text-anchor="middle" font-size="11" fill="#993C1D">GND</text>
  <text x="355" y="137" text-anchor="middle" font-size="11" fill="#993C1D">5V</text>
  <text x="395" y="137" text-anchor="middle" font-size="11" fill="#993C1D">Signal</text>

  <!-- Sensor VCC → Arduino 5V (blue) -->
  <polyline points="190,219 212,219 212,197 240,197" fill="none" stroke="#378ADD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sensor GND → Arduino GND (gray) -->
  <polyline points="190,243 214,243 214,221 240,221" fill="none" stroke="#888780" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sensor DO → Arduino Pin 2 (green) -->
  <polyline points="190,267 216,267 216,245 240,245" fill="none" stroke="#639922" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Servo GND → Arduino GND (gray dashed) -->
  <polyline points="315,120 315,155 218,155 218,221 240,221" fill="none" stroke="#888780" stroke-width="2" stroke-dasharray="5,3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Servo 5V → Arduino 5V (blue dashed) -->
  <polyline points="355,120 355,153 216,153 216,197 240,197" fill="none" stroke="#378ADD" stroke-width="2" stroke-dasharray="5,3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Servo Signal → Arduino Pin 9 (orange) -->
  <polyline points="395,120 395,151 455,151 455,269 440,269" fill="none" stroke="#D85A30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Legend -->
  <rect x="35" y="330" width="610" height="70" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="340" y="350" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">Wire legend</text>
  <line x1="55" y1="372" x2="100" y2="372" stroke="#378ADD" stroke-width="2"/>
  <text x="108" y="376" font-size="11" fill="#2C2C2A">5V / VCC</text>
  <line x1="200" y1="372" x2="245" y2="372" stroke="#888780" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="253" y="376" font-size="11" fill="#2C2C2A">GND shared</text>
  <line x1="370" y1="372" x2="415" y2="372" stroke="#639922" stroke-width="2"/>
  <text x="423" y="376" font-size="11" fill="#2C2C2A">DO → Pin 2</text>
  <line x1="510" y1="372" x2="555" y2="372" stroke="#D85A30" stroke-width="2"/>
  <text x="563" y="376" font-size="11" fill="#2C2C2A">Signal → Pin 9~</text>

  <!-- Note -->
  <text x="340" y="18" text-anchor="middle" font-size="11" fill="#5F5E5A">HL-009 via 3.3V · SG90 via 5V · use INPUT_PULLUP in code · all GNDs share a common rail</text>
</svg>
